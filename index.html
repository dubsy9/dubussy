<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dubussy's Paradise</title>
    <meta name="description" content="AI-powered chat with Ollama cloud models. Select from multiple models including vision-capable options.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="icon" href="/artifacts/dubussy-fav.jpg" type="image/jpeg">
    <link href="./style.css" rel="stylesheet" />
</head>
<body>
    <div id="app-wrapper">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">Dubussy</div>
                <button id="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                    ☰
                </button>
            </div>

            <div class="nav-group">
                <p class="label"><span>AI</span></p>
                <div class="model-selector-container">
                    <select id="model-selector" class="model-selector">
                        <option value="">Loading models...</option>
                    </select>
                </div>
            </div>
        </aside>

        <main id="content">
            <div id="chat-wrapper">
                <div id="chat-container"></div>
                <div class="chat-input-wrapper">
                    <textarea id="chat-input" placeholder="Type a message..."></textarea>
                    <div class="file-upload-container">
                        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" capture="environment">
                        <button id="send-btn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
