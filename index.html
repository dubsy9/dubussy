<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dubussy's Paradise</title>
    <meta name="description" content="AI-powered chat with Ollama cloud models. Select from multiple models including vision-capable options.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="icon" href="/artifacts/dubussy-fav.jpg" type="image/jpeg">
    <link href="./style.css" rel="stylesheet" />
</head>
<body>
    <div id="app-wrapper">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">Dubussy</div>
                <button id="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                    ☰
                </button>
            </div>

            <div class="nav-group">
                <p class="label"><span>AI</span></p>
                <div class="model-selector-container">
                    <select id="model-selector" class="model-selector">
                        <option value="">Loading models...</option>
                    </select>
                </div>
            </div>
        </aside>

        <main id="content">
            <div id="chat-wrapper">
                <div id="chat-container"></div>
                <div class="chat-input-wrapper">
                    <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" capture="environment">
                    <button id="attach-btn" class="attach-btn" title="Attach image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <textarea id="chat-input" placeholder="Type a message..."></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                    <button id="clear-btn" class="clear-btn" title="Clear chat">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
